# Use postgres/example user/password credentials

services:
  app:
    build: .
    ports:
      - "1337:1337"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: example

  frontend:
    build: ./frontend
    depends_on:
      - app
    ports:
      - "5173:5173"

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      retries: 5
      start_period: 30s
      timeout: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
